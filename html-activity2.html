<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headings and Text Formatting</title>
</head>
<body>

    <h1>Main Heading</h1> 
    <h2>Sub Heading</h2>
    <h3>Section Heading</h3>
    <h4>Minor Heading</h4>
    <h5>Small Heading</h5>
    <h6>Tiny Heading</h6>

    <p>

        I am <strong>student</strong>who loves<em>technology</em>. 
        I enjoy <b>coding</b>, <i>designing</i>, and <u>learning new skills</u>.
        My favorite subject is <mark>Computer Science</mark>.
    
    </p>


    </body>

    </html>
