<!DOCTYPE html>
<html lang="en">
    
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initialscale=1.0">
 <title>Bootstrap Activity</title>
 <!-- LOCAL BOOTSTRAP CSS -->
 <link rel="stylesheet"
href="assets/bootstrap/css/bootstrap.min.css">
</head>


<body>
 <!-- CONTENT GOES HERE -->

    <div class="container py-5">

        <h2 class="mb-4">
            Payments Management
        </h2>

        <!-- Add Payment Button -->
        <div class="mb-3 text-end">

            <button
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#paymentModal">

                Add Payment

            </button>

        </div>

        <!-- Payments Table -->
        <div class="table-responsive">

            <table class="table table-bordered table-striped">

                <thead class="table-dark">

                    <tr>
                        <th>OR No.</th>
                        <th>Student</th>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td>1001</td>
                        <td>Juan Dela Cruz</td>
                        <td>Tuition Fee</td>
                        <td>₱5,000</td>
                        <td>July 10, 2025</td>

                        <td>
                            <button class="btn btn-warning btn-sm">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm">
                                Delete
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>1002</td>
                        <td>Maria Santos</td>
                        <td>Laboratory Fee</td>
                        <td>₱1,500</td>
                        <td>July 10, 2025</td>

                        <td>
                            <button class="btn btn-warning btn-sm">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm">
                                Delete
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>1003</td>
                        <td>Pedro Reyes</td>
                        <td>Library Fee</td>
                        <td>₱800</td>
                        <td>July 10, 2025</td>

                        <td>
                            <button class="btn btn-warning btn-sm">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm">
                                Delete
                            </button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- Modal -->
    <div class="modal fade"
         id="paymentModal"
         tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header bg-primary text-white">

                    <h5 class="modal-title">
                        Add Payment
                    </h5>

                    <button
                        type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <form>

                        <!-- OR Number -->
                        <div class="mb-3">

                            <label class="form-label">
                                OR No.
                            </label>

                            <input
                                type="text"
                                class="form-control">

                        </div>

                        <!-- Student Name -->
                        <div class="mb-3">

                            <label class="form-label">
                                Student Name
                            </label>

                            <input
                                type="text"
                                class="form-control">

                        </div>

                        <!-- Description -->
                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                class="form-control"
                                rows="3">
                            </textarea>

                        </div>

                        <!-- Amount -->
                        <div class="mb-3">

                            <label class="form-label">
                                Amount
                            </label>

                            <input
                                type="number"
                                class="form-control">

                        </div>

                        <!-- Payment Type -->
                        <div class="mb-3">

                            <label class="form-label">
                                Payment Type
                            </label>

                            <select class="form-select">

                                <option selected disabled>
                                    Select Payment Type
                                </option>

                                <option>Cash</option>
                                <option>GCash</option>
                                <option>Bank Transfer</option>
                                <option>Credit Card</option>

                            </select>

                        </div>

                    </form>

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Close

                    </button>

                    <button
                        class="btn btn-primary">

                        Save Payment

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>

</html>
 <!-- LOCAL BOOTSTRAP JS -->
 <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
