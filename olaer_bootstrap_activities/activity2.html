<!DOCTYPE html>
<html lang="en">
    
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initialscale=1.0">
 <title>Bootstrap Activity</title>
 <!-- LOCAL BOOTSTRAP CSS -->
 <link rel="stylesheet"
href="assets/bootstrap/css/bootstrap.min.css">
</head>


<body>
 <!-- CONTENT GOES HERE -->

    <div class="container py-5">

    <h1 class="text-center mb-4">
        SRMS Dashboard
    </h1>

    <div class="row g-4">

        <!-- Card 1 -->
        <div class="col-12 col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h2 class="fw-bold">1200</h2>
                    <span class="badge bg-success">
                        Success
                    </span>
                    <p class="mt-2">
                        Total Students
                    </p>
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-12 col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h2 class="fw-bold">350</h2>
                    <span class="badge bg-warning">
                        Warning
                    </span>
                    <p class="mt-2">
                        Total Faculty
                    </p>
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-12 col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h2 class="fw-bold">98%</h2>
                    <span class="badge bg-info">
                        Info
                    </span>
                    <p class="mt-2">
                        Passing Rate
                    </p>
                </div>
            </div>
        </div>

        <!-- Card 4 -->
        <div class="col-12 col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h2 class="fw-bold">45</h2>
                    <span class="badge bg-danger">
                        Danger
                    </span>
                    <p class="mt-2">
                        New Enrollees
                    </p>
                </div>
            </div>
        </div>

    </div>

    </div>
    
 <!-- LOCAL BOOTSTRAP JS -->
 <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
