<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>

    <style>
        /* Element Selector */
        h1 {
            color: darkblue;
            text-align: center;
        }

        /* Element Selector */
        p {
            font-size: 17px;
            line-height: 1.5;
        }

        /* Class Selector */
        .highlight {
            background-color: lightyellow;
            padding: 10px;
            font-weight: bold;
        }

        /* ID Selector  */
        #important {
            color: white;
            background-color: darkred;
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1> Understanding CSS Selectors</h1>

    <p>
        An element selector applies styles to every HTML element
        that uses the specified tag.
    </p>

    <p class="highlight">
        A class selector can be used by several HTML elements.
    </p>

    <p id="important">
       An ID selector should identify one unique element on a webpage.
    </p>
    
</body>
</html>
