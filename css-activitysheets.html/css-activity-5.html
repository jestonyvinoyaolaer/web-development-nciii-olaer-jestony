<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eaf2fb;
            padding: 50px;
            }

        .profile-card {
            width: 350px;
            margin: auto;
            padding: 25px;
            background-color: white;
            border: 1px solid #cccccc;
            border-radius: 15px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.20);
            text-align: center;
            }

        .profile-card img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #0066cc;
            object-fit: cover;
            }

        .profile-card h1 {
            color: #173b6c;
            margin-bottom: 5px;
            }

        .profile-card h3 {
            color: #666666;
            margin-top: 0;
            }

        .profile-card p {
            line-height: 1.6;
            color: #333333;
            }

        .profile-card button {
            background-color: #0066cc;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            }

        .profile-card button:hover {
            background-color: #003f7f;
            }
    </style>
</head>

<body>
    <div class="profile-card">

        <img
            src="https://via.placeholder.com/130"
            alt="Student profile picture"
        >

        <h1>Juan Dela Cruz</h1>

        <h3>Grade 10 – Rizal</h3>

        <p>
            I am a student who enjoys learning about web development,
            computer programming, and digital technology.
        </p>

        <button type="button">View Profile</button>

    </div>
    
</body>
</html>
